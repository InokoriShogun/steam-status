<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
}
.box {
  padding: 10px;
}
.ok { color: #00ff88; }
.ng { color: #ff4d4d; }
</style>
</head>
<body>
<div class="box">
  <h3>Steamサーバー状態</h3>
  <div id="status">読み込み中...</div>
</div>

<script>
fetch("https://steamstat.us/api")
  .then(res => res.json())
  .then(data => {
    const s = data.services;
    const html = `
      Store: <span class="${s.SteamStore === 'normal' ? 'ok' : 'ng'}">${s.SteamStore}</span><br>
      Community: <span class="${s.SteamCommunity === 'normal' ? 'ok' : 'ng'}">${s.SteamCommunity}</span><br>
      Login: <span class="${s.SteamClient === 'normal' ? 'ok' : 'ng'}">${s.SteamClient}</span>
    `;
    document.getElementById("status").innerHTML = html;
  });
</script>
</body>
</html>
